services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: endura-postgres
    environment:
      POSTGRES_DB: endura
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - endura-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d endura"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  endura-postgres-data:
